<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 180" width="680" height="180">
  <!-- LuxeLeadPro Full Logo — Light Background -->

  <rect width="680" height="180" rx="12" fill="#FAFAF8"/>

  <!-- Icon Mark — navy strokes with gold accent -->
  <g transform="translate(72, 82) scale(0.42)">
    <!-- Left slope -->
    <line x1="-104" y1="56" x2="0" y2="-104"
          stroke="#0A192F" stroke-width="22" stroke-linecap="round"/>
    <!-- Right slope -->
    <line x1="104" y1="56" x2="0" y2="-104"
          stroke="#0A192F" stroke-width="22" stroke-linecap="round"/>
    <!-- Base line -->
    <line x1="-104" y1="56" x2="104" y2="56"
          stroke="#0A192F" stroke-width="8" stroke-linecap="round" opacity="0.25"/>
    <!-- Intelligence crossbar -->
    <line x1="-64" y1="-8" x2="64" y2="-8"
          stroke="#D4AF37" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
    <!-- AI Apex Node -->
    <circle cx="0" cy="-104" r="22" fill="#D4AF37"/>
    <circle cx="0" cy="-104" r="9" fill="#FAFAF8"/>
  </g>

  <!-- Wordmark -->
  <text x="142" y="96" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="44" font-weight="700" fill="#0A192F" letter-spacing="-0.5">Luxe<tspan font-weight="400" fill="#0A192F">Lead</tspan><tspan font-weight="700" fill="#D4AF37">Pro</tspan></text>

  <!-- Tagline -->
  <text x="142" y="122" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" font-weight="500" fill="#94A3B8" letter-spacing="3.2">AI-POWERED LUXURY LEAD INTELLIGENCE</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- LuxeLeadPro Icon Mark — Transparent Background (Navy version for light contexts) -->

  <g transform="translate(256, 270)">
    <!-- Left slope -->
    <line x1="-104" y1="56" x2="0" y2="-104"
          stroke="#0A192F" stroke-width="20" stroke-linecap="round"/>
    <!-- Right slope -->
    <line x1="104" y1="56" x2="0" y2="-104"
          stroke="#0A192F" stroke-width="20" stroke-linecap="round"/>
    <!-- Base line -->
    <line x1="-104" y1="56" x2="104" y2="56"
          stroke="#0A192F" stroke-width="8" stroke-linecap="round" opacity="0.25"/>
    <!-- Intelligence crossbar -->
    <line x1="-64" y1="-8" x2="64" y2="-8"
          stroke="#D4AF37" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
    <!-- AI Apex Node -->
    <circle cx="0" cy="-104" r="20" fill="#D4AF37"/>
    <circle cx="0" cy="-104" r="8" fill="white"/>
  </g>
</svg>

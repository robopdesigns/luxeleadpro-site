<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 180" width="680" height="180">
  <!-- LuxeLeadPro Full Logo V2 — Dark Background -->
  <!-- Tighter kerning, better vertical alignment -->

  <rect width="680" height="180" rx="12" fill="#0A192F"/>

  <!-- Icon Mark — scaled and centered vertically -->
  <g transform="translate(72, 82) scale(0.42)">
    <!-- Left slope -->
    <line x1="-104" y1="56" x2="0" y2="-104"
          stroke="#D4AF37" stroke-width="22" stroke-linecap="round"/>
    <!-- Right slope -->
    <line x1="104" y1="56" x2="0" y2="-104"
          stroke="#D4AF37" stroke-width="22" stroke-linecap="round"/>
    <!-- Base line -->
    <line x1="-104" y1="56" x2="104" y2="56"
          stroke="#D4AF37" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
    <!-- Intelligence crossbar -->
    <line x1="-64" y1="-8" x2="64" y2="-8"
          stroke="#D4AF37" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
    <!-- AI Apex Node -->
    <circle cx="0" cy="-104" r="22" fill="#D4AF37"/>
    <circle cx="0" cy="-104" r="9" fill="#0A192F"/>
  </g>

  <!-- Wordmark: "LuxeLeadPro" as a single connected brand name -->
  <!-- "Luxe" bold + "Lead" regular + "Pro" bold gold — all tightly kerned -->
  <text x="142" y="96" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="44" font-weight="700" fill="#F8FAFC" letter-spacing="-0.5">Luxe<tspan font-weight="400" fill="#F8FAFC">Lead</tspan><tspan font-weight="700" fill="#D4AF37">Pro</tspan></text>

  <!-- Tagline -->
  <text x="142" y="122" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" font-weight="500" fill="#64748B" letter-spacing="3.2">AI-POWERED LUXURY LEAD INTELLIGENCE</text>
</svg>
